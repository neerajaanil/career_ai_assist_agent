<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Neeraja Anil | Software Engineer</title>

  <!-- SEO -->
  <meta name="description" content="Neeraja Anil — Staff Software Engineer building data-driven web platforms and analytics systems.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <style>
    :root {
      --bg: #ffffff;
      --text: #111827;
      --card: #f3f4f6;
      --accent: #2563eb;
    }

    [data-theme="dark"] {
      --bg: #0b1220;
      --text: #e5e7eb;
      --card: #111827;
      --accent: #60a5fa;
    }

    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: 0.3s;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      background: var(--card);
    }

    .profile {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .profile img {
      width: 48px;
      height: 48px;
      border-radius: 50%;
    }

    .buttons a, .buttons button {
      margin-left: 10px;
      padding: 6px 12px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      background: var(--accent);
      color: white;
      text-decoration: none;
    }

    .bio, .contact {
      max-width: 900px;
      margin: auto;
      padding: 24px;
    }

    iframe {
      width: 100%;
      height: 70vh;
      border: none;
    }

    .contact input, .contact textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .contact button {
      background: var(--accent);
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 6px;
      cursor: pointer;
    }

    footer {
      text-align: center;
      padding: 12px;
      font-size: 12px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<header>
  <div class="profile">
    <img src="profile.jpg" alt="Neeraja Anil">
    <strong>Neeraja Anil</strong>
  </div>

  <div class="buttons">
    <a href="linkedin.pdf" download>📄 Resume</a>
    <a href="https://www.linkedin.com/in/neeraja-anil/" target="_blank">LinkedIn</a>
    <button onclick="toggleTheme()">🌙</button>
  </div>
</header>

<section class="bio">
  <p>
    Staff Software Engineer building scalable data-driven web platforms. 
    Loves fantasy novels, seafood, movies, and dreams of living by the sea.
  </p>
</section>

<iframe src="https://neerajaanil-career-conversations.hf.space"></iframe>

<!-- 📬 Contact Form -->
<section class="contact">
  <h2>Contact Me</h2>

  <!-- Uses FormSubmit (free email forwarding) -->
  <form action="https://formsubmit.co/neeraja.anil2012@gmail.com" method="POST">
    <input type="text" name="name" placeholder="Neeraja Anil" required />
    <input type="email" name="email" placeholder="neeraja.anil2012@gmail.com" required />
    <textarea name="message" rows="5" placeholder="Say hello! Whether it’s about tech, books, movies, or seafood 🦀" required></textarea>

    <!-- Prevent spam -->
    <input type="hidden" name="_captcha" value="false">

    <button type="submit">Send Message</button>
  </form>
</section>

<footer>
  © Neeraja Anil
</footer>

<script>
  function toggleTheme() {
    const theme = document.documentElement.getAttribute("data-theme");
    document.documentElement.setAttribute(
      "data-theme",
      theme === "dark" ? "light" : "dark"
    );
  }
</script>

</body>
</html>
